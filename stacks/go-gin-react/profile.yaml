name: go-gin-react
display_name: "Go (Gin) + React"
description: "Go еҗҺз«Ҝ Domain еҲҶеұӮпјҲtypesвҶ’configвҶ’repositoryвҶ’serviceвҶ’handlerвҶ’routerпјү+ Next.js/Vite React еүҚз«Ҝ"

# еҗҺз«ҜеЈ°жҳҺ
backend:
  language: go
  code_skill: code-backend
  module_dir: "internal/domain/{module}"
  layering: "typesвҶ’configвҶ’repositoryвҶ’serviceвҶ’handlerвҶ’router"
  conventions_ref: "docs/references/go-conventions.md"
  baseline_check: "scripts/baseline-check.sh"
  contract_sync: "scripts/contract-sync.sh"
  integration_test: "scripts/integration-test.sh"
  build_cmd: "go build ./..."
  lint_cmd: "golangci-lint run"
  coverage:
    service: 80
    handler: 70

# еүҚз«ҜеЈ°жҳҺ
frontend:
  language: typescript
  code_skill: code-frontend
  module_dir: "src/app/{module}"
  conventions_ref: "docs/references/nextjs-conventions.md"
  integration_test: "scripts/integration-test-frontend.sh"
  build_cmd: "npm run build"
  lint_cmd: "npx next lint"

# еҘ‘зәҰж јејҸ
contract:
  format: openapi
  path: "docs/api-specs/{module}.yaml"
  shared_path: null

# UI иғҪеҠӣ
ui: optional

# зӣ®еҪ•еҲқе§ӢеҢ–
scaffold:
  dirs:
    - "internal/domain"
    - "src/app"
    - "docs/api-specs"
    - "docs/modules"
    - "docs/requirements"
    - "docs/design-docs/adr"
    - "docs/design-specs"
    - "docs/plans"
    - "docs/references"
    - "docs/templates"
    - "docs/ui-prototypes"
    - ".harness/tasks"
    - ".harness/artifacts"
    - ".harness/logs"
    - ".harness/reports"
  files: []

# иғҪеҠӣејҖе…і
capabilities:
  has_backend: true
  has_frontend: true
  has_contract: true
  has_ui: true
