name: python-fastapi-vue
display_name: "Python (FastAPI) + Vue"
description: "Python еҗҺз«ҜеҲҶеұӮпјҲroutersвҶ’servicesвҶ’repositoriesвҶ’modelsвҶ’schemasпјү+ Vue 3 еүҚз«Ҝ"

# еҗҺз«ҜеЈ°жҳҺ
backend:
  language: python
  code_skill: code-backend
  module_dir: "app/modules/{module}"
  layering: "routersвҶ’servicesвҶ’repositoriesвҶ’modelsвҶ’schemas"
  conventions_ref: "docs/references/python-conventions.md"
  baseline_check: "scripts/baseline-check.sh"
  contract_sync: "scripts/contract-sync.sh"
  integration_test: "scripts/integration-test.sh"
  build_cmd: "python -m py_compile $(find app -name '*.py')"
  lint_cmd: "ruff check app/"
  coverage:
    service: 80
    router: 70

# еүҚз«ҜеЈ°жҳҺ
frontend:
  language: typescript
  code_skill: code-frontend
  module_dir: "src/modules/{module}"
  conventions_ref: "docs/references/vue-conventions.md"
  integration_test: "scripts/integration-test-frontend.sh"
  build_cmd: "npm run build"
  lint_cmd: "npx eslint src/"

# еҘ‘зәҰж јејҸ
contract:
  format: openapi
  path: "docs/api-specs/{module}.yaml"
  shared_path: null

# UI иғҪеҠӣ
ui: optional

# зӣ®еҪ•еҲқе§ӢеҢ–
scaffold:
  dirs:
    - "app/modules"
    - "app/core"
    - "src/modules"
    - "src/components"
    - "src/stores"
    - "src/router"
    - "docs/api-specs"
    - "docs/modules"
    - "docs/requirements"
    - "docs/design-docs/adr"
    - "docs/design-specs"
    - "docs/plans"
    - "docs/references"
    - "docs/templates"
    - "docs/ui-prototypes"
    - ".harness/tasks"
    - ".harness/artifacts"
    - ".harness/logs"
    - ".harness/reports"
  files: []

# иғҪеҠӣејҖе…і
capabilities:
  has_backend: true
  has_frontend: true
  has_contract: true
  has_ui: true
